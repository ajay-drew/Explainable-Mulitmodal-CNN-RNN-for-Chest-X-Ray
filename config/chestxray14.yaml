mode: cnn
dataset: chestxray14

# Paths
data_dir: data/chestxray14
results_dir: results
checkpoint_dir: checkpoints
csv_path: data/chestxray14/Data_Entry_2017.csv
train_list: data/chestxray14/train_val_list.txt
test_list: data/chestxray14/test_list.txt
images_dir: data/chestxray14/images

# Models
image_model: densenet121-res224-all
radbert_model: StanfordAIMI/RadBERT

# Data
image_size: 224
num_workers: 4
batch_size: 32
val_split: 0.1
seed: 42

# Labels
num_classes: 15

# XAI
gradcam_method: gradcam
n_ig_steps: 50
n_shap_samples: 100
disease_threshold: 0.5

# Device
device: cpu

log_level: INFO
